<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Finanças</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f1f5f4;
}

header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.resumo {
    display: flex;
    justify-content: space-between;
    text-align: center;
}

.resumo div {
    flex: 1;
}

.tabs {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
}

.tab {
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
}

.active {
    border-bottom: 3px solid #2e7d32;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2e7d32;
    color: white;
    font-weight: bold;
    margin-top: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

.receita { color: green; }
.despesa { color: red; }

.delete {
    color: red;
    cursor: pointer;
    margin-left: 10px;
}

.ia-box {
    background: #e8f5e9;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>💰 Minhas Finanças</header>

<div class="container">

<div class="card">
    <b id="mesAtual"></b>
</div>

<div class="card resumo">
    <div>Receita<br><b id="receita">0</b></div>
    <div>Despesa<br><b id="despesa">0</b></div>
    <div>Saldo<br><b id="saldo">0</b></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="trocarTab('resumo')">Resumo</div>
    <div class="tab" onclick="trocarTab('extrato')">Extrato</div>
</div>

<div id="resumoTab" class="card">
    <canvas id="grafico"></canvas>

    <div class="ia-box" id="iaResumo">
        🤖 Análise: carregando...
    </div>
</div>

<div id="extratoTab" class="card" style="display:none">
    <div id="lista"></div>
</div>

<div class="card">
    <input id="texto" placeholder="Ex: ganhei 100 / mercado 50 / uber 20">
    <button onclick="adicionar()">Adicionar</button>
</div>

</div>

<script src="script.js"></script>

<!-- Registro do Service Worker -->
<script>
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log('Service Worker registrado ✅'))
    .catch((err) => console.log('Erro SW:', err));
}
</script>

</body>
</html>
